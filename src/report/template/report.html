<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gitpeek Report</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:24px}
header{text-align:center;padding:32px 0;border-bottom:1px solid #21262d;margin-bottom:32px}
header h1{font-size:2rem;color:#58a6ff;margin-bottom:8px}
header .meta{font-size:0.9rem;color:#8b949e}
.section{margin-bottom:40px}
.section h2{font-size:1.4rem;color:#58a6ff;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #21262d}
.chart-container{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:16px;margin-bottom:16px}
.chart{width:100%;height:400px}
.chart-half{width:100%;height:350px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bus-factor-summary{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.bus-factor-number{font-size:3rem;font-weight:bold;color:#58a6ff}
.bus-factor-label{font-size:0.9rem;color:#8b949e}
table.dir-table{width:100%;border-collapse:collapse;margin-top:16px}
table.dir-table th,table.dir-table td{padding:8px 12px;text-align:left;border-bottom:1px solid #21262d}
table.dir-table th{color:#8b949e;font-weight:600;font-size:0.85rem;text-transform:uppercase}
table.dir-table td{color:#c9d1d9}
.risk-list{margin-top:12px;padding-left:20px}
.risk-list li{color:#f85149;font-size:0.9rem;margin-bottom:4px}
.warning{background:#1c1206;border:1px solid #bb8009;border-radius:6px;padding:12px 16px;color:#e3b341;margin-bottom:16px;font-size:0.9rem}
footer{text-align:center;padding:24px 0;border-top:1px solid #21262d;margin-top:32px;color:#8b949e;font-size:0.85rem}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.chart{height:300px}.chart-half{height:280px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>📊 gitpeek Report</h1>
<div class="meta" id="report-meta"></div>
</header>

<section class="section">
<h2>👥 Top Contributors</h2>
<div class="chart-container">
<div id="chart-contributors" class="chart"></div>
</div>
</section>

<section class="section">
<h2>🔥 Commit Activity Heatmap</h2>
<div class="chart-container">
<div id="chart-heatmap" class="chart"></div>
</div>
</section>

<section class="section">
<h2>📁 Code Hotspots</h2>
<div class="chart-container">
<div id="chart-hotspots" class="chart"></div>
</div>
</section>

<section class="section">
<h2>📈 Complexity Trend</h2>
<div class="chart-container">
<div id="chart-complexity" class="chart"></div>
</div>
</section>

<section class="section">
<h2>🚌 Bus Factor</h2>
<div class="chart-container">
<div class="bus-factor-summary">
<div>
<div class="bus-factor-number" id="bus-factor-value">-</div>
<div class="bus-factor-label">Overall Bus Factor</div>
</div>
<div id="chart-busfactor-gauge" style="width:200px;height:200px"></div>
</div>
<table class="dir-table" id="bus-factor-table">
<thead><tr><th>Directory</th><th>Bus Factor</th><th>Top Author</th></tr></thead>
<tbody></tbody>
</table>
<div id="risk-section" style="display:none">
<h3 style="color:#f85149;margin-top:16px;font-size:1rem">⚠️ Single-Point-of-Knowledge Risks</h3>
<ul class="risk-list" id="risk-list"></ul>
</div>
</div>
</section>

<section class="section" id="pr-velocity-section">
<h2>🚀 PR Velocity</h2>
<div id="pr-velocity-warning" class="warning" style="display:none"></div>
<div class="chart-container">
<div id="chart-pr-velocity" class="chart-half"></div>
</div>
</section>

<footer>
Generated by <strong>gitpeek</strong> &mdash; <span id="generated-at"></span>
</footer>
</div>

<!-- ECHARTS_JS -->

<script>
<!-- REPORT_DATA -->
</script>

<script>
(function() {
  var data = window.__GITPEEK_DATA__;
  if (!data) return;

  var darkText = '#8b949e';
  var lightText = '#c9d1d9';
  var axisStyle = { axisLine: { lineStyle: { color: darkText } }, splitLine: { lineStyle: { color: '#21262d' } } };

  // Meta
  var meta = document.getElementById('report-meta');
  if (meta) {
    meta.textContent = data.repoName + ' \u00B7 ' + data.analyzedBranch + ' \u00B7 ' +
      new Date(data.dateRange.from).toLocaleDateString() + ' \u2013 ' + new Date(data.dateRange.to).toLocaleDateString();
  }
  var genAt = document.getElementById('generated-at');
  if (genAt) genAt.textContent = new Date(data.generatedAt).toLocaleString();

  // 1. Contributor Bar Chart
  var contribEl = document.getElementById('chart-contributors');
  if (contribEl && data.contributions && data.contributions.authors.length > 0) {
    var authors = data.contributions.authors.slice(0, 50);
    var contribChart = echarts.init(contribEl);
    contribChart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      xAxis: Object.assign({ type: 'category', data: authors.map(function(a) { return a.name; }), axisLabel: { color: darkText, rotate: 45 } }, axisStyle),
      yAxis: Object.assign({ type: 'value', axisLabel: { color: darkText } }, axisStyle),
      series: [
        { name: 'Commits', type: 'bar', data: authors.map(function(a) { return a.commits; }), itemStyle: { color: '#58a6ff' } }
      ],
      grid: { left: 60, right: 20, bottom: 80, top: 20 }
    });
  }

  // 2. Heatmap
  var heatmapEl = document.getElementById('chart-heatmap');
  if (heatmapEl && data.contributions && data.contributions.heatmap) {
    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var hours = [];
    for (var h = 0; h < 24; h++) hours.push(h + ':00');
    var heatData = [];
    var maxVal = 0;
    for (var d = 0; d < 7; d++) {
      for (var hr = 0; hr < 24; hr++) {
        var val = data.contributions.heatmap[d] ? (data.contributions.heatmap[d][hr] || 0) : 0;
        heatData.push([hr, d, val]);
        if (val > maxVal) maxVal = val;
      }
    }
    var heatChart = echarts.init(heatmapEl);
    heatChart.setOption({
      tooltip: { position: 'top', formatter: function(p) { return days[p.value[1]] + ' ' + hours[p.value[0]] + ': ' + p.value[2] + ' commits'; } },
      xAxis: { type: 'category', data: hours, axisLabel: { color: darkText }, splitArea: { show: true } },
      yAxis: { type: 'category', data: days, axisLabel: { color: darkText } },
      visualMap: { min: 0, max: maxVal || 1, calculable: true, orient: 'horizontal', left: 'center', bottom: 0, inRange: { color: ['#0d1117','#1f6feb','#58a6ff'] }, textStyle: { color: darkText } },
      series: [{ type: 'heatmap', data: heatData, label: { show: false }, emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } } }],
      grid: { left: 60, right: 20, bottom: 60, top: 10 }
    });
  }

  // 3. Hotspot Horizontal Bar
  var hotspotEl = document.getElementById('chart-hotspots');
  if (hotspotEl && data.hotspots && data.hotspots.hotspots.length > 0) {
    var spots = data.hotspots.hotspots.slice(0, 30);
    spots.reverse();
    var hotspotChart = echarts.init(hotspotEl);
    hotspotChart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      yAxis: { type: 'category', data: spots.map(function(s) { return s.filePath; }), axisLabel: { color: darkText, fontSize: 11 } },
      xAxis: Object.assign({ type: 'value', axisLabel: { color: darkText } }, axisStyle),
      series: [{ name: 'Changes', type: 'bar', data: spots.map(function(s) { return s.changeCount; }), itemStyle: { color: '#f0883e' } }],
      grid: { left: 250, right: 20, bottom: 20, top: 10 }
    });
  }

  // 4. Complexity Line Chart
  var complexEl = document.getElementById('chart-complexity');
  if (complexEl && data.complexity && data.complexity.snapshots.length > 0) {
    var snaps = data.complexity.snapshots;
    var complexChart = echarts.init(complexEl);
    complexChart.setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['Total Size','Total Files','Churn Rate'], textStyle: { color: darkText }, top: 0 },
      xAxis: Object.assign({ type: 'category', data: snaps.map(function(s) { return new Date(s.date).toLocaleDateString(); }), axisLabel: { color: darkText, rotate: 30 } }, axisStyle),
      yAxis: [
        Object.assign({ type: 'value', name: 'Size / Files', axisLabel: { color: darkText }, nameTextStyle: { color: darkText } }, axisStyle),
        Object.assign({ type: 'value', name: 'Churn Rate', axisLabel: { color: darkText }, nameTextStyle: { color: darkText } }, axisStyle)
      ],
      series: [
        { name: 'Total Size', type: 'line', data: snaps.map(function(s) { return s.totalSize; }), smooth: true, itemStyle: { color: '#58a6ff' } },
        { name: 'Total Files', type: 'line', data: snaps.map(function(s) { return s.totalFiles; }), smooth: true, itemStyle: { color: '#3fb950' } },
        { name: 'Churn Rate', type: 'line', yAxisIndex: 1, data: snaps.map(function(s) { return s.churnRate; }), smooth: true, itemStyle: { color: '#f85149' } }
      ],
      grid: { left: 60, right: 60, bottom: 60, top: 40 }
    });
  }

  // 5. Bus Factor Gauge + Table
  var bfValue = document.getElementById('bus-factor-value');
  if (bfValue && data.busFactor) {
    bfValue.textContent = data.busFactor.overall.busFactor;
  }
  var gaugeEl = document.getElementById('chart-busfactor-gauge');
  if (gaugeEl && data.busFactor) {
    var gaugeChart = echarts.init(gaugeEl);
    gaugeChart.setOption({
      series: [{
        type: 'gauge', min: 0, max: 10, progress: { show: true, width: 14 },
        axisLine: { lineStyle: { width: 14 } },
        axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
        pointer: { show: false },
        title: { show: false },
        detail: { valueAnimation: true, fontSize: 24, color: '#58a6ff', offsetCenter: [0, 0] },
        data: [{ value: data.busFactor.overall.busFactor }]
      }]
    });
  }
  var bfTable = document.getElementById('bus-factor-table');
  if (bfTable && data.busFactor && data.busFactor.perDirectory) {
    var tbody = bfTable.querySelector('tbody');
    var dirs = data.busFactor.perDirectory;
    if (Array.isArray(dirs)) {
      dirs.forEach(function(entry) {
        var row = document.createElement('tr');
        var topAuth = entry[1].topAuthors && entry[1].topAuthors[0] ? entry[1].topAuthors[0].name : '-';
        row.innerHTML = '<td>' + entry[0] + '</td><td>' + entry[1].busFactor + '</td><td>' + topAuth + '</td>';
        tbody.appendChild(row);
      });
    } else if (typeof dirs === 'object') {
      Object.keys(dirs).forEach(function(key) {
        var val = dirs[key];
        var row = document.createElement('tr');
        var topAuth = val.topAuthors && val.topAuthors[0] ? val.topAuthors[0].name : '-';
        row.innerHTML = '<td>' + key + '</td><td>' + val.busFactor + '</td><td>' + topAuth + '</td>';
        tbody.appendChild(row);
      });
    }
  }
  var riskSection = document.getElementById('risk-section');
  var riskList = document.getElementById('risk-list');
  if (riskSection && riskList && data.busFactor && data.busFactor.singlePointRisks && data.busFactor.singlePointRisks.length > 0) {
    riskSection.style.display = 'block';
    data.busFactor.singlePointRisks.forEach(function(f) {
      var li = document.createElement('li');
      li.textContent = f;
      riskList.appendChild(li);
    });
  }

  // 6. PR Velocity Line Chart
  var prSection = document.getElementById('pr-velocity-section');
  var prWarning = document.getElementById('pr-velocity-warning');
  var prEl = document.getElementById('chart-pr-velocity');
  if (data.prVelocity) {
    if (!data.prVelocity.available) {
      if (prWarning) { prWarning.style.display = 'block'; prWarning.textContent = data.prVelocity.warningMessage || 'PR velocity data unavailable.'; }
      if (prEl) prEl.style.display = 'none';
    } else if (prEl && data.prVelocity.mergesPerMonth.length > 0) {
      var months = data.prVelocity.mergesPerMonth;
      var prChart = echarts.init(prEl);
      prChart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: Object.assign({ type: 'category', data: months.map(function(m) { return m.month; }), axisLabel: { color: darkText, rotate: 30 } }, axisStyle),
        yAxis: Object.assign({ type: 'value', name: 'Merges', axisLabel: { color: darkText }, nameTextStyle: { color: darkText } }, axisStyle),
        series: [{ name: 'Merges', type: 'line', data: months.map(function(m) { return m.count; }), smooth: true, areaStyle: { color: 'rgba(63,185,80,0.2)' }, itemStyle: { color: '#3fb950' } }],
        grid: { left: 60, right: 20, bottom: 60, top: 20 }
      });
    }
  }

  // Resize handler
  window.addEventListener('resize', function() {
    echarts.getInstanceByDom && document.querySelectorAll('.chart,.chart-half,[id^="chart-"]').forEach(function(el) {
      var inst = echarts.getInstanceByDom(el);
      if (inst) inst.resize();
    });
  });
})();
</script>
</body>
</html>
