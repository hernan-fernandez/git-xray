<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>git-xray Report</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:24px}
header{text-align:center;padding:32px 0;border-bottom:1px solid #21262d;margin-bottom:32px}
header h1{font-size:2rem;color:#58a6ff;margin-bottom:8px}
header .meta{font-size:0.9rem;color:#8b949e}
.section{margin-bottom:40px}
.section h2{font-size:1.4rem;color:#58a6ff;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #21262d}.chart-container{background:#161b22;border:1px solid #21262d;border-radius:8px;padding:16px;margin-bottom:16px}
.chart{width:100%;height:400px}
.chart-half{width:100%;height:350px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.bus-factor-summary{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.bus-factor-number{font-size:3rem;font-weight:bold;color:#58a6ff}
.bus-factor-label{font-size:0.9rem;color:#8b949e}
table.dir-table{width:100%;border-collapse:collapse;margin-top:16px}
table.dir-table th,table.dir-table td{padding:8px 12px;text-align:left;border-bottom:1px solid #21262d}
table.dir-table th{color:#8b949e;font-weight:600;font-size:0.85rem;text-transform:uppercase}
table.dir-table td{color:#c9d1d9}
.risk-list{margin-top:12px;padding-left:0;list-style:none}
.risk-list li{color:#c9d1d9;font-size:0.9rem;margin-bottom:0;border:1px solid #21262d;border-radius:6px;overflow:hidden}
.risk-list li+li{margin-top:6px}
.risk-header{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.15s}
.risk-header:hover{background:#1c2028}
.risk-header .risk-arrow{transition:transform 0.2s;color:#8b949e;font-size:0.7rem}
.risk-header.open .risk-arrow{transform:rotate(90deg)}
.risk-header .risk-file{flex:1;color:#f85149;font-family:monospace;font-size:0.85rem}
.risk-header .risk-badge{background:#f8514920;color:#f85149;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600}
.risk-detail{display:none;padding:0 14px 12px 30px;font-size:0.85rem;color:#8b949e;line-height:1.7}
.risk-detail.open{display:block}
.risk-detail strong{color:#c9d1d9}
.risk-group{border:1px solid #21262d;border-radius:8px;overflow:hidden;margin-bottom:8px}
.risk-group-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#161b22;transition:background 0.15s}
.risk-group-header:hover{background:#1c2028}
.risk-group-header .risk-arrow{transition:transform 0.2s;color:#8b949e;font-size:0.7rem}
.risk-group-header.open .risk-arrow{transform:rotate(90deg)}
.risk-group-header .risk-dir{flex:1;color:#58a6ff;font-family:monospace;font-size:0.9rem;font-weight:600}
.risk-group-header .risk-count{color:#8b949e;font-size:0.8rem}
.risk-group-header .risk-badge{background:#f8514920;color:#f85149;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600}
.risk-group-body{display:none;border-top:1px solid #21262d}
.risk-group-body.open{display:block}
.risk-group-body .risk-list{margin:0;border-radius:0}
.risk-group-body .risk-list li{border-radius:0;border-left:0;border-right:0;border-top:0}
.risk-group-body .risk-list li:last-child{border-bottom:0}
.risk-filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.risk-filter-bar span{color:#8b949e;font-size:0.85rem}
.risk-filter-bar .filter-count{color:#c9d1d9;font-weight:600}
.warning{background:#1c1206;border:1px solid #bb8009;border-radius:6px;padding:12px 16px;color:#e3b341;margin-bottom:16px;font-size:0.9rem}
footer{text-align:center;padding:24px 0;border-top:1px solid #21262d;margin-top:32px;color:#8b949e;font-size:0.85rem}
.summary-card{background:linear-gradient(135deg,#161b22 0%,#1a2332 50%,#161b22 100%);border:1px solid #30363d;border-radius:16px;padding:32px;margin-bottom:40px;position:relative;overflow:hidden}
.summary-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(88,166,255,0.03) 0%,transparent 70%);pointer-events:none}
.summary-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:24px;text-align:center;margin-bottom:24px}
.stat-item .stat-value{font-size:2.2rem;font-weight:bold;color:#58a6ff;line-height:1.2}
.stat-item .stat-label{font-size:0.8rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.awards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:24px}
.award{background:#0d1117;border:1px solid #21262d;border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;transition:border-color 0.2s}
.award:hover{border-color:#58a6ff}
.award .award-icon{font-size:1.8rem;flex-shrink:0}
.award .award-text{flex:1}
.award .award-title{font-size:0.75rem;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px}
.award .award-value{font-size:0.95rem;color:#c9d1d9;font-weight:500;margin-top:2px}
.share-bar{display:flex;justify-content:center;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid #21262d}
.share-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:1px solid #30363d;background:#161b22;color:#c9d1d9;font-size:0.85rem;cursor:pointer;text-decoration:none;transition:all 0.2s}
.share-btn:hover{border-color:#58a6ff;color:#58a6ff;background:#0d1117}
.share-btn.twitter{border-color:#1d9bf0;color:#1d9bf0}
.share-btn.twitter:hover{background:#1d9bf015}
.personality-badge{display:inline-block;padding:8px 20px;border-radius:20px;font-size:0.85rem;font-weight:600;letter-spacing:0.5px}
.personality-icon{font-size:2.5rem;margin-bottom:4px}
.personality-type{font-size:1.4rem;font-weight:bold;color:#c9d1d9}
.personality-desc{font-size:0.9rem;color:#8b949e;margin-top:4px}
.personality-traits{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.personality-trait{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:4px 12px;font-size:0.8rem;color:#8b949e}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.chart{height:300px}.chart-half{height:280px}}
</style>
</head>
<body>
<div class="container">
<header>
<h1>🔍 git-xray Report</h1>
<div class="meta" id="report-meta"></div>
</header>

<div class="summary-card" id="summary-card">
<div id="personality-badge" style="text-align:center;margin-bottom:16px"></div>
<div id="summary-text" style="display:none;text-align:center;max-width:700px;margin:0 auto 20px;font-size:0.95rem;color:#8b949e;line-height:1.7"></div>
<div class="summary-stats" id="summary-stats"></div>
<div class="awards" id="awards"></div>
<div class="share-bar" id="share-bar"></div>
</div>

<div class="summary-card" id="personal-card" style="display:none">
<div style="text-align:center;margin-bottom:16px">
<div style="font-size:2.5rem">🧑‍💻</div>
<div id="personal-name" style="font-size:1.6rem;font-weight:bold;color:#58a6ff"></div>
<div id="personal-subtitle" style="font-size:0.9rem;color:#8b949e;margin-top:4px"></div>
</div>
<div class="summary-stats" id="personal-stats"></div>
<div class="awards" id="personal-awards"></div>
<div id="personal-files" style="margin-top:20px"></div>
<div class="share-bar" id="personal-share"></div>
</div>

<section class="section">
<h2>👥 Top Contributors</h2>
<div class="chart-container">
<div id="chart-contributors" class="chart"></div>
</div>
</section>

<section class="section">
<h2>🔥 Commit Activity Heatmap</h2>
<div class="chart-container">
<div id="chart-heatmap" class="chart"></div>
</div>
</section>

<section class="section">
<h2>📁 Code Hotspots</h2>
<div class="chart-container">
<div id="chart-hotspots" class="chart"></div>
</div>
</section>

<section class="section">
<h2>📈 Complexity Trend</h2>
<div class="chart-container">
<div id="chart-complexity" class="chart"></div>
</div>
</section>

<section class="section">
<h2>🚌 Bus Factor</h2>
<div class="chart-container">
<div class="bus-factor-summary">
<div>
<div class="bus-factor-number" id="bus-factor-value">-</div>
<div class="bus-factor-label">Overall Bus Factor</div>
</div>
<div id="chart-busfactor-gauge" style="width:200px;height:200px"></div>
</div>
<table class="dir-table" id="bus-factor-table">
<thead><tr><th>Directory</th><th>Bus Factor</th><th>Top Author</th></tr></thead>
<tbody></tbody>
</table>
<div id="risk-section" style="display:none">
<h3 style="color:#f85149;margin-top:16px;font-size:1rem;display:flex;align-items:center;gap:12px">⚠️ Single-Point-of-Knowledge Risks <button id="export-risks-csv" class="share-btn" style="font-size:0.75rem;padding:4px 12px;margin:0">📥 Export CSV</button></h3>
<div class="risk-filter-bar" id="risk-filter-info"></div>
<div id="risk-groups"></div>
<ul class="risk-list" id="risk-list" style="display:none"></ul>
</div>
</div>
</section>

<section class="section" id="pr-velocity-section">
<h2>🚀 PR Velocity</h2>
<div id="pr-velocity-warning" class="warning" style="display:none"></div>
<div class="chart-container">
<div id="chart-pr-velocity" class="chart-half"></div>
</div>
</section>

<footer>
Generated by <strong>git-xray</strong> &mdash; <span id="generated-at"></span>
</footer>
</div>

<!-- ECHARTS_JS -->

<script>
<!-- REPORT_DATA -->
</script>

<script>
(function() {
  var data = window.__GITPEEK_DATA__;
  if (!data) return;

  var darkText = '#8b949e';
  var lightText = '#c9d1d9';
  var axisStyle = { axisLine: { lineStyle: { color: darkText } }, splitLine: { lineStyle: { color: '#21262d' } } };

  // Meta
  var meta = document.getElementById('report-meta');
  if (meta) {
    meta.textContent = data.repoName + ' \u00B7 ' + data.analyzedBranch + ' \u00B7 ' +
      new Date(data.dateRange.from).toLocaleDateString() + ' \u2013 ' + new Date(data.dateRange.to).toLocaleDateString();
  }
  var genAt = document.getElementById('generated-at');
  if (genAt) genAt.textContent = new Date(data.generatedAt).toLocaleString();

  // Summary Card
  // Personality Badge
  var pbEl = document.getElementById('personality-badge');
  if (pbEl && data.personality) {
    var pers = data.personality;
    var traitsHtml = pers.traits.map(function(t) { return '<span class="personality-trait">' + t + '</span>'; }).join('');
    pbEl.innerHTML =
      '<div class="personality-icon">' + pers.icon + '</div>' +
      '<div class="personality-type">' + pers.type + '</div>' +
      '<div class="personality-desc">' + pers.description + '</div>' +
      '<div class="personality-traits">' + traitsHtml + '</div>';
  }

  var statsEl = document.getElementById('summary-stats');
  // Summary text
  var sumEl = document.getElementById('summary-text');
  if (sumEl && data.summary) {
    sumEl.style.display = 'block';
    sumEl.textContent = data.summary;
  }

  if (statsEl) {
    var stats = [
      { value: data.contributions.totalCommits.toLocaleString(), label: 'Total Commits' },
      { value: data.contributions.authors.length, label: 'Contributors' },
      { value: data.hotspots.hotspots.length.toLocaleString(), label: 'Files Tracked' },
      { value: data.busFactor.overall.busFactor, label: 'Bus Factor' },
    ];
    if (data.prVelocity.available && data.prVelocity.averageMergeTime) {
      var days = (data.prVelocity.averageMergeTime / 86400000).toFixed(1);
      stats.push({ value: days + 'd', label: 'Avg Merge Time' });
    }
    if (data.prVelocity.available) {
      stats.push({ value: data.prVelocity.totalMerges, label: 'Total Merges' });
    }
    stats.forEach(function(s) {
      var div = document.createElement('div');
      div.className = 'stat-item';
      div.innerHTML = '<div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div>';
      statsEl.appendChild(div);
    });
  }

  // Awards
  var awardsEl = document.getElementById('awards');
  if (awardsEl) {
    var awards = [];
    var authors = data.contributions.authors;
    if (authors.length > 0) {
      var top = authors[0];
      var isBot = top.name.toLowerCase().includes('bot');
      awards.push({ icon: isBot ? '🤖' : '👑', title: isBot ? 'Bot Overlord' : 'Top Contributor', value: top.name + ' (' + top.commits + ' commits)' });
      // Most lines added
      var maxAdded = authors.slice().sort(function(a,b){return b.linesAdded-a.linesAdded;})[0];
      if (maxAdded) awards.push({ icon: '✍️', title: 'Code Machine', value: maxAdded.name + ' (+' + maxAdded.linesAdded.toLocaleString() + ' lines)' });
      // Most lines removed
      var maxRemoved = authors.slice().sort(function(a,b){return b.linesRemoved-a.linesRemoved;})[0];
      if (maxRemoved && maxRemoved.linesRemoved > 0) awards.push({ icon: '🧹', title: 'Cleanup Crew', value: maxRemoved.name + ' (-' + maxRemoved.linesRemoved.toLocaleString() + ' lines)' });
    }
    if (data.hotspots.hotspots.length > 0) {
      var hottest = data.hotspots.hotspots[0];
      awards.push({ icon: '🔥', title: 'Hottest File', value: hottest.filePath.split('/').pop() + ' (' + hottest.changeCount + ' changes)' });
    }
    if (data.busFactor.overall.busFactor <= 1) {
      awards.push({ icon: '⚠️', title: 'Bus Factor Alert', value: 'Only 1 person holds the keys' });
    } else if (data.busFactor.overall.busFactor >= 5) {
      awards.push({ icon: '💪', title: 'Well Distributed', value: 'Bus factor of ' + data.busFactor.overall.busFactor + ' — healthy!' });
    }
    if (data.busFactor.singlePointRisks && data.busFactor.singlePointRisks.length > 0) {
      var riskCount = data.busFactor.singlePointRisks.length;
      var topRisk = typeof data.busFactor.singlePointRisks[0] === 'string' ? null : data.busFactor.singlePointRisks[0];
      var riskDesc = riskCount + ' files with a single maintainer';
      if (topRisk) riskDesc = riskCount + ' files — worst: ' + topRisk.authorPercentage + '% by ' + topRisk.soleAuthor;
      awards.push({ icon: '🎯', title: 'Knowledge Silos', value: riskDesc });
    }
    // Find busiest day from heatmap
    if (data.contributions.heatmap) {
      var dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      var daySums = data.contributions.heatmap.map(function(row){return row.reduce(function(a,b){return a+b;},0);});
      var busiestDay = daySums.indexOf(Math.max.apply(null, daySums));
      if (daySums[busiestDay] > 0) awards.push({ icon: '📅', title: 'Busiest Day', value: dayNames[busiestDay] + ' (' + daySums[busiestDay] + ' commits)' });
    }
    awards.forEach(function(a) {
      var div = document.createElement('div');
      div.className = 'award';
      div.innerHTML = '<span class="award-icon">' + a.icon + '</span><div class="award-text"><div class="award-title">' + a.title + '</div><div class="award-value">' + a.value + '</div></div>';
      awardsEl.appendChild(div);
    });
  }

  // Share Button
  var shareBar = document.getElementById('share-bar');
  if (shareBar) {
    var topName = (data.contributions.authors[0] || {}).name || 'unknown';
    var persType = data.personality ? data.personality.icon + ' ' + data.personality.type + '\n' : '';
    var tweetText = encodeURIComponent(
      '🔍 ' + data.repoName + ' git-xray:\n' +
      persType +
      '• ' + data.contributions.totalCommits + ' commits\n' +
      '• ' + data.contributions.authors.length + ' contributors\n' +
      '• Bus factor: ' + data.busFactor.overall.busFactor + '\n' +
      '• Top contributor: ' + topName + '\n\n' +
      'Generated with git-xray 🔬'
    );
    var tweetUrl = 'https://twitter.com/intent/tweet?text=' + tweetText;
    shareBar.innerHTML =
      '<a class="share-btn twitter" href="' + tweetUrl + '" target="_blank" rel="noopener">🐦 Share on X</a>' +
      '<button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href).then(function(){this.textContent=\'✓ Copied!\'}.bind(this))">📋 Copy Link</button>';
  }

  // Personal Mode
  if (data.personal && data.personal.totalCommits > 0) {
    var p = data.personal;
    document.getElementById('summary-card').style.display = 'none';
    var pc = document.getElementById('personal-card');
    pc.style.display = 'block';

    document.getElementById('personal-name').textContent = p.author + "'s Year in Code";
    document.getElementById('personal-subtitle').textContent = data.repoName + ' · ' + (p.firstCommit ? new Date(p.firstCommit).toLocaleDateString() : '') + ' – ' + (p.lastCommit ? new Date(p.lastCommit).toLocaleDateString() : '');

    var ps = document.getElementById('personal-stats');
    var pStats = [
      { value: p.totalCommits.toLocaleString(), label: 'Commits' },
      { value: '+' + p.linesAdded.toLocaleString(), label: 'Lines Added' },
      { value: '-' + p.linesRemoved.toLocaleString(), label: 'Lines Removed' },
      { value: p.longestStreak + 'd', label: 'Longest Streak' },
      { value: p.busiestDay, label: 'Busiest Day' },
      { value: p.impactPercentage + '%', label: 'Files Touched' },
    ];
    pStats.forEach(function(s) {
      var div = document.createElement('div');
      div.className = 'stat-item';
      div.innerHTML = '<div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div>';
      ps.appendChild(div);
    });

    var pa = document.getElementById('personal-awards');
    p.awards.forEach(function(a) {
      var div = document.createElement('div');
      div.className = 'award';
      div.innerHTML = '<span class="award-icon">' + a.icon + '</span><div class="award-text"><div class="award-title">' + a.title + '</div><div class="award-value">' + a.value + '</div></div>';
      pa.appendChild(div);
    });

    // Top files list
    if (p.topFiles && p.topFiles.length > 0) {
      var pf = document.getElementById('personal-files');
      pf.innerHTML = '<h3 style="color:#58a6ff;font-size:1rem;margin-bottom:8px">📁 Your Top Files</h3>';
      var ul = document.createElement('ul');
      ul.style.cssText = 'list-style:none;padding:0';
      p.topFiles.slice(0, 8).forEach(function(f) {
        var li = document.createElement('li');
        li.style.cssText = 'padding:6px 0;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;font-size:0.85rem';
        li.innerHTML = '<span style="color:#c9d1d9;font-family:monospace">' + f.filePath + '</span><span style="color:#8b949e">' + f.changes + ' changes</span>';
        ul.appendChild(li);
      });
      pf.appendChild(ul);
    }

    // Personal share button
    var pShare = document.getElementById('personal-share');
    var pTweet = encodeURIComponent(
      '🧑‍💻 My ' + data.repoName + ' stats:\n' +
      '• ' + p.totalCommits + ' commits\n' +
      '• +' + p.linesAdded.toLocaleString() + ' / -' + p.linesRemoved.toLocaleString() + ' lines\n' +
      '• ' + p.longestStreak + ' day streak\n' +
      '• Touched ' + p.impactPercentage + '% of all files\n\n' +
      'Generated with git-xray --me 🔍'
    );
    pShare.innerHTML =
      '<a class="share-btn twitter" href="https://twitter.com/intent/tweet?text=' + pTweet + '" target="_blank" rel="noopener">🐦 Share on X</a>' +
      '<button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href).then(function(){this.textContent=\'✓ Copied!\'}.bind(this))">📋 Copy Link</button>';
  }

  // 1. Contributor Bar Chart
  var contribEl = document.getElementById('chart-contributors');
  if (contribEl && data.contributions && data.contributions.authors.length > 0) {
    var authors = data.contributions.authors.slice(0, 50);
    var contribChart = echarts.init(contribEl);
    contribChart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      xAxis: Object.assign({ type: 'category', data: authors.map(function(a) { return a.name; }), axisLabel: { color: darkText, rotate: 45 } }, axisStyle),
      yAxis: Object.assign({ type: 'value', axisLabel: { color: darkText } }, axisStyle),
      series: [
        { name: 'Commits', type: 'bar', data: authors.map(function(a) { return a.commits; }), itemStyle: { color: '#58a6ff' } }
      ],
      grid: { left: 60, right: 20, bottom: 80, top: 20 }
    });
  }

  // 2. Heatmap
  var heatmapEl = document.getElementById('chart-heatmap');
  if (heatmapEl && data.contributions && data.contributions.heatmap) {
    var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var hours = [];
    for (var h = 0; h < 24; h++) hours.push(h + ':00');
    var heatData = [];
    var maxVal = 0;
    for (var d = 0; d < 7; d++) {
      for (var hr = 0; hr < 24; hr++) {
        var val = data.contributions.heatmap[d] ? (data.contributions.heatmap[d][hr] || 0) : 0;
        heatData.push([hr, d, val]);
        if (val > maxVal) maxVal = val;
      }
    }
    var heatChart = echarts.init(heatmapEl);
    heatChart.setOption({
      tooltip: { position: 'top', formatter: function(p) { return days[p.value[1]] + ' ' + hours[p.value[0]] + ': ' + p.value[2] + ' commits'; } },
      xAxis: { type: 'category', data: hours, axisLabel: { color: darkText }, splitArea: { show: true } },
      yAxis: { type: 'category', data: days, axisLabel: { color: darkText } },
      visualMap: { min: 0, max: maxVal || 1, calculable: true, orient: 'horizontal', left: 'center', bottom: 0, inRange: { color: ['#0d1117','#1f6feb','#58a6ff'] }, textStyle: { color: darkText } },
      series: [{ type: 'heatmap', data: heatData, label: { show: false }, emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } } }],
      grid: { left: 60, right: 20, bottom: 60, top: 10 }
    });
  }

  // 3. Hotspot Horizontal Bar
  var hotspotEl = document.getElementById('chart-hotspots');
  if (hotspotEl && data.hotspots && data.hotspots.hotspots.length > 0) {
    var spots = data.hotspots.hotspots.slice(0, 30);
    spots.reverse();
    var hotspotChart = echarts.init(hotspotEl);
    hotspotChart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      yAxis: { type: 'category', data: spots.map(function(s) { return s.filePath; }), axisLabel: { color: darkText, fontSize: 11 } },
      xAxis: Object.assign({ type: 'value', axisLabel: { color: darkText } }, axisStyle),
      series: [{ name: 'Changes', type: 'bar', data: spots.map(function(s) { return s.changeCount; }), itemStyle: { color: '#f0883e' } }],
      grid: { left: 250, right: 20, bottom: 20, top: 10 }
    });
  }

  // 4. Complexity Line Chart
  var complexEl = document.getElementById('chart-complexity');
  if (complexEl && data.complexity && data.complexity.snapshots.length > 0) {
    var snaps = data.complexity.snapshots;
    var complexChart = echarts.init(complexEl);
    complexChart.setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['Total Size','Total Files','Churn Rate'], textStyle: { color: darkText }, top: 0 },
      xAxis: Object.assign({ type: 'category', data: snaps.map(function(s) { return new Date(s.date).toLocaleDateString(); }), axisLabel: { color: darkText, rotate: 30 } }, axisStyle),
      yAxis: [
        Object.assign({ type: 'value', name: 'Size / Files', axisLabel: { color: darkText }, nameTextStyle: { color: darkText } }, axisStyle),
        Object.assign({ type: 'value', name: 'Churn Rate', axisLabel: { color: darkText }, nameTextStyle: { color: darkText } }, axisStyle)
      ],
      series: [
        { name: 'Total Size', type: 'line', data: snaps.map(function(s) { return s.totalSize; }), smooth: true, itemStyle: { color: '#58a6ff' } },
        { name: 'Total Files', type: 'line', data: snaps.map(function(s) { return s.totalFiles; }), smooth: true, itemStyle: { color: '#3fb950' } },
        { name: 'Churn Rate', type: 'line', yAxisIndex: 1, data: snaps.map(function(s) { return s.churnRate; }), smooth: true, itemStyle: { color: '#f85149' } }
      ],
      grid: { left: 60, right: 60, bottom: 60, top: 40 }
    });
  }

  // 5. Bus Factor Gauge + Table
  var bfValue = document.getElementById('bus-factor-value');
  if (bfValue && data.busFactor) {
    bfValue.textContent = data.busFactor.overall.busFactor;
  }
  var gaugeEl = document.getElementById('chart-busfactor-gauge');
  if (gaugeEl && data.busFactor) {
    var gaugeChart = echarts.init(gaugeEl);
    gaugeChart.setOption({
      series: [{
        type: 'gauge', min: 0, max: 10, progress: { show: true, width: 14 },
        axisLine: { lineStyle: { width: 14 } },
        axisTick: { show: false }, splitLine: { show: false }, axisLabel: { show: false },
        pointer: { show: false },
        title: { show: false },
        detail: { valueAnimation: true, fontSize: 24, color: '#58a6ff', offsetCenter: [0, 0] },
        data: [{ value: data.busFactor.overall.busFactor }]
      }]
    });
  }
  var bfTable = document.getElementById('bus-factor-table');
  if (bfTable && data.busFactor && data.busFactor.perDirectory) {
    var tbody = bfTable.querySelector('tbody');
    var dirs = data.busFactor.perDirectory;
    if (Array.isArray(dirs)) {
      dirs.forEach(function(entry) {
        var row = document.createElement('tr');
        var topAuth = entry[1].topAuthors && entry[1].topAuthors[0] ? entry[1].topAuthors[0].name : '-';
        row.innerHTML = '<td>' + entry[0] + '</td><td>' + entry[1].busFactor + '</td><td>' + topAuth + '</td>';
        tbody.appendChild(row);
      });
    } else if (typeof dirs === 'object') {
      Object.keys(dirs).forEach(function(key) {
        var val = dirs[key];
        var row = document.createElement('tr');
        var topAuth = val.topAuthors && val.topAuthors[0] ? val.topAuthors[0].name : '-';
        row.innerHTML = '<td>' + key + '</td><td>' + val.busFactor + '</td><td>' + topAuth + '</td>';
        tbody.appendChild(row);
      });
    }
  }
  var riskSection = document.getElementById('risk-section');
  var riskGroups = document.getElementById('risk-groups');
  var riskFilterInfo = document.getElementById('risk-filter-info');
  if (riskSection && riskGroups && data.busFactor && data.busFactor.singlePointRisks && data.busFactor.singlePointRisks.length > 0) {
    riskSection.style.display = 'block';
    var filtered = data.busFactor.singlePointRisks;

    riskFilterInfo.innerHTML = '<span>Showing <span class="filter-count">' + filtered.length + '</span> actionable risks</span>' +
      '<span style="color:#484f58">(boilerplate and single-change files excluded)</span>';

    // Group by second-level directory (e.g. "typescript/postgres-lambda")
    var groups = {};
    filtered.forEach(function(risk) {
      var fp = typeof risk === 'string' ? risk : risk.filePath;
      var parts = fp.split('/');
      var groupKey = parts.length >= 2 ? parts.slice(0, 2).join('/') : parts[0];
      if (!groups[groupKey]) groups[groupKey] = [];
      groups[groupKey].push(risk);
    });

    var sortedGroups = Object.keys(groups).sort(function(a, b) {
      return groups[b].length - groups[a].length;
    });

    sortedGroups.forEach(function(groupKey) {
      var groupRisks = groups[groupKey];
      var groupDiv = document.createElement('div');
      groupDiv.className = 'risk-group';

      var authorCounts = {};
      groupRisks.forEach(function(r) {
        if (typeof r !== 'string' && r.soleAuthor) {
          authorCounts[r.soleAuthor] = (authorCounts[r.soleAuthor] || 0) + 1;
        }
      });
      var dominantAuthor = Object.keys(authorCounts).sort(function(a,b){return authorCounts[b]-authorCounts[a];})[0] || '?';
      var maxPct = Math.max.apply(null, groupRisks.map(function(r){return typeof r === 'string' ? 100 : r.authorPercentage;}));

      var header = document.createElement('div');
      header.className = 'risk-group-header';
      header.innerHTML = '<span class="risk-arrow">▶</span>' +
        '<span class="risk-dir">' + groupKey + '/</span>' +
        '<span class="risk-count">' + groupRisks.length + ' file' + (groupRisks.length !== 1 ? 's' : '') + ' · ' + dominantAuthor + '</span>' +
        '<span class="risk-badge">' + maxPct + '% risk</span>';
      groupDiv.appendChild(header);

      var body = document.createElement('div');
      body.className = 'risk-group-body';
      var ul = document.createElement('ul');
      ul.className = 'risk-list';

      groupRisks.forEach(function(risk) {
        var li = document.createElement('li');
        var isString = typeof risk === 'string';
        var filePath = isString ? risk : risk.filePath;
        var fileName = filePath.split('/').pop();
        var rh = document.createElement('div');
        rh.className = 'risk-header';
        if (isString) {
          rh.innerHTML = '<span class="risk-arrow">▶</span><span class="risk-file">' + filePath + '</span>';
        } else {
          rh.innerHTML = '<span class="risk-arrow">▶</span><span class="risk-file">' + filePath + '</span><span class="risk-badge">' + risk.authorPercentage + '%</span>';
        }
        li.appendChild(rh);
        if (!isString) {
          var detail = document.createElement('div');
          detail.className = 'risk-detail';
          var spanText = risk.spanMonths > 0 ? risk.spanMonths + ' month' + (risk.spanMonths !== 1 ? 's' : '') : 'less than a month';
          detail.innerHTML =
            '<strong>' + risk.soleAuthor + '</strong> is the only recent contributor.<br>' +
            '• <strong>' + risk.authorPercentage + '%</strong> of all ' + risk.totalChanges + ' changes<br>' +
            '• Active for <strong>' + spanText + '</strong><br>' +
            '• Last touched: <strong>' + new Date(risk.lastSeen).toLocaleDateString() + '</strong><br>' +
            '<em style="color:#e3b341;margin-top:4px;display:inline-block">💡 If ' + risk.soleAuthor + ' leaves, knowledge of <code style="background:#21262d;padding:2px 6px;border-radius:3px">' + fileName + '</code> could be lost.</em>';
          li.appendChild(detail);
          rh.addEventListener('click', function(e) {
            e.stopPropagation();
            rh.classList.toggle('open');
            detail.classList.toggle('open');
          });
        }
        ul.appendChild(li);
      });

      body.appendChild(ul);
      groupDiv.appendChild(body);

      header.addEventListener('click', function() {
        header.classList.toggle('open');
        body.classList.toggle('open');
      });

      riskGroups.appendChild(groupDiv);
    });

    // CSV Export button
    var csvBtn = document.getElementById('export-risks-csv');
    if (csvBtn) {
      csvBtn.addEventListener('click', function() {
        var rows = [['File','Sole Author','Author %','Total Changes','Span (months)','Last Touched']];
        filtered.forEach(function(r) {
          if (typeof r === 'string') {
            rows.push([r,'','','','','']);
          } else {
            rows.push([r.filePath, r.soleAuthor, r.authorPercentage + '%', r.totalChanges, r.spanMonths, new Date(r.lastSeen).toLocaleDateString()]);
          }
        });
        var csv = rows.map(function(row) {
          return row.map(function(cell) {
            var s = String(cell);
            return s.indexOf(',') >= 0 || s.indexOf('"') >= 0 ? '"' + s.replace(/"/g, '""') + '"' : s;
          }).join(',');
        }).join('\n');
        var blob = new Blob([csv], { type: 'text/csv' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = data.repoName + '-risks.csv';
        a.click();
        URL.revokeObjectURL(url);
      });
    }
  }

  // 6. PR Velocity Line Chart
  var prSection = document.getElementById('pr-velocity-section');
  var prWarning = document.getElementById('pr-velocity-warning');
  var prEl = document.getElementById('chart-pr-velocity');
  if (data.prVelocity) {
    if (!data.prVelocity.available) {
      if (prWarning) { prWarning.style.display = 'block'; prWarning.textContent = data.prVelocity.warningMessage || 'PR velocity data unavailable.'; }
      if (prEl) prEl.style.display = 'none';
    } else if (prEl && data.prVelocity.mergesPerMonth.length > 0) {
      var months = data.prVelocity.mergesPerMonth;
      var prChart = echarts.init(prEl);
      prChart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: Object.assign({ type: 'category', data: months.map(function(m) { return m.month; }), axisLabel: { color: darkText, rotate: 30 } }, axisStyle),
        yAxis: Object.assign({ type: 'value', name: 'Merges', axisLabel: { color: darkText }, nameTextStyle: { color: darkText } }, axisStyle),
        series: [{ name: 'Merges', type: 'line', data: months.map(function(m) { return m.count; }), smooth: true, areaStyle: { color: 'rgba(63,185,80,0.2)' }, itemStyle: { color: '#3fb950' } }],
        grid: { left: 60, right: 20, bottom: 60, top: 20 }
      });
    }
  }

  // Resize handler
  window.addEventListener('resize', function() {
    echarts.getInstanceByDom && document.querySelectorAll('.chart,.chart-half,[id^="chart-"]').forEach(function(el) {
      var inst = echarts.getInstanceByDom(el);
      if (inst) inst.resize();
    });
  });
})();
</script>
</body>
</html>
